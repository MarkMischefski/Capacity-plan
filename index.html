<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Block Stock</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0e17">

<!-- iOS "Add to Home Screen" support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Block Stock">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">

<!-- Android / general -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>
  :root {
    --bg:        #0a0e17;
    --surface:   #121826;
    --card:      #161d2e;
    --border:    #232b3d;
    --border2:   #2a3244;
    --accent:    #f97316;
    --accent2:   #ea580c;
    --green:     #22c55e;
    --amber:     #f59e0b;
    --red:       #ef4444;
    --blue:      #3b82f6;
    --text:      #e8ecf4;
    --muted:     #8892a4;
    --faint:     #4a556a;
    --mono:      'JetBrains Mono', monospace;
    --sans:      -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html {
    height: 100%;
    background: var(--bg);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    height: 100vh;
    height: 100dvh;
    width: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    /* Respect notches / home indicator on iOS */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior-y: contain;
  }

  input, select { -webkit-user-select: text; user-select: text; }

  #splash-screen {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    transition: opacity 0.3s ease;
  }
  #splash-screen.hide {
    opacity: 0;
    pointer-events: none;
  }
  .splash-icon {
    width: 84px;
    height: 84px;
    border-radius: 20px;
    animation: splash-pulse 1.8s ease-in-out infinite;
  }
  @keyframes splash-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.85; transform: scale(0.96); }
  }
  .splash-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .splash-title span { color: var(--accent); }
  .splash-status {
    font-size: 13px;
    color: var(--muted);
  }

  .header {
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
  }
  .header h1 span { color: var(--accent); }
  .header .branch-name {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .grade-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .grade-tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border2);
    white-space: nowrap;
  }
  .grade-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .page-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .content {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
  }

  .stock-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .stock-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .stock-label { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.4px; }
  .stock-val   { font-family: var(--mono); font-size: 30px; font-weight: 700; line-height: 1; margin-top: 3px; }

  .qty-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }
  .qty-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 8px;
    border-radius: 8px;
    font-size: 12.5px;
    font-weight: 600;
    text-align: center;
  }
  .qty-btn:active { background: var(--border2); }
  .qty-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .qty-btn.primary:active { background: var(--accent2); }

  .week-block {
    margin-top: 16px;
  }
  .week-block-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  .week-block-title .req-fcast { font-family: var(--mono); font-weight: 600; color: var(--faint); text-transform: none; }

  .day-row {
    display: flex;
    gap: 6px;
  }
  .day-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .day-dow {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--muted);
  }
  .day-dow.today { color: var(--accent); }
  .day-input {
    width: 100%;
    text-align: center;
    font-family: var(--mono);
    font-size: 14px;
    padding: 8px 2px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
  }
  .day-input:disabled { opacity: 0.4; }
  .day-input.override { border-color: var(--blue); }
  .day-input.actual    { border-color: var(--accent); }
  .day-sub {
    font-size: 8px;
    color: var(--faint);
    height: 10px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .ti { font-size: 36px; color: var(--faint); margin-bottom: 10px; }

  .status-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 7px 16px;
    font-size: 11px;
    color: var(--faint);
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--faint);
    flex-shrink: 0;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .status-dot.error     { background: var(--red); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: none;
    align-items: flex-end;
  }
  .modal-overlay.show { display: flex; }
  .modal-sheet {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-height: 85vh;
    max-height: 85dvh;
    overflow-y: auto;
    padding: 20px 18px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .form-row { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .form-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 8px;
    font-size: 15px;
    font-family: var(--sans);
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1;
    padding: 13px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    border: none;
  }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.secondary { background: var(--card); color: var(--muted); border: 1px solid var(--border2); }

  .toast {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .bottom-nav {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 8px 14px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    text-align: center;
    padding: 9px 0 8px;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--muted);
    font-size: 11.5px;
    font-weight: 600;
  }
  .nav-btn .ti { font-size: 19px; }
  .nav-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .nav-btn:active { opacity: 0.85; }

  .today-row {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 7px;
  }
  .today-row .grade-name { font-size: 12px; font-weight: 600; line-height: 1.25; overflow: hidden; text-overflow: ellipsis; }
  .today-row .grade-sub  { font-size: 11px; color: var(--faint); margin-top: 1px; }
  .prod-day-inputs {
    flex: 1;
    display: flex;
    gap: 5px;
    min-width: 0;
  }
  .prod-daycol-head {
    flex: 1;
    min-width: 0;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    line-height: 1.3;
  }
  .prod-daycol-head.today { color: var(--accent); }
  .today-row .today-input {
    flex: 1;
    min-width: 0;
    width: 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 14px;
    padding: 8px 0;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
  }
  .today-row .today-input.actual { border-color: var(--accent); }

  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type=number] {
    -moz-appearance: textfield;
  }

</style>
</head>
<body>

  <div id="splash-screen">
    <img src="icon-512.png" alt="" class="splash-icon">
    <div class="splash-title">Block <span>Stock</span></div>
    <div class="splash-status" id="splash-status">Connecting to database…</div>
  </div>

  <div class="header">
    <h1 id="page-title">Block <span>Forecast</span></h1>
    <div class="branch-name" id="branch-name-display">Loading…</div>
  </div>

  <!-- ══ STOCK PAGE ══ -->
  <div id="page-stock" class="page-wrap">
    <div class="grade-tabs" id="grade-tabs"></div>
    <div class="content" id="content">
      <div class="empty-state">
        <div>Loading stock data…</div>
      </div>
    </div>
  </div>

  <!-- ══ TODAY'S PRODUCTION PAGE ══ -->
  <div id="page-today" class="page-wrap" style="display:none;">
    <div class="content" id="today-content">
      <div class="empty-state">
        <div>Loading…</div>
      </div>
    </div>
  </div>

  <!-- ══ STOCKTAKE PAGE ══ -->
  <div id="page-stocktake" class="page-wrap" style="display:none;">
    <div class="content" id="stocktake-content">
      <div class="empty-state">
        <div>Loading…</div>
      </div>
    </div>
  </div>

  <!-- ══ SETTINGS PAGE ══ -->
  <div id="page-settings" class="page-wrap" style="display:none;">
    <div class="content">
      <div class="form-row">
        <div class="form-label">Supabase URL</div>
        <input type="text" class="form-input" id="set-supa-url" placeholder="https://xxxx.supabase.co">
      </div>
      <div class="form-row">
        <div class="form-label">Supabase key</div>
        <input type="text" class="form-input" id="set-supa-key" placeholder="service role or anon key">
      </div>
      <div class="form-row">
        <div class="form-label">Branch number for this device</div>
        <input type="number" class="form-input" id="set-branch-no" placeholder="e.g. 4">
        <div id="set-branch-names" style="font-size:11px;color:var(--faint);margin-top:6px;line-height:1.5;"></div>
      </div>
      <button class="btn primary" style="width:100%;margin-top:8px;" onclick="saveDeviceSettings()">Save &amp; reconnect</button>
      <div id="settings-save-msg" style="text-align:center;font-size:12px;color:var(--green);margin-top:10px;display:none;">Saved — reconnecting…</div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Connecting…</span>
  </div>

  <div class="bottom-nav">
    <div class="nav-btn active" id="nav-stock-btn" onclick="showPage('stock')">
      <i class="ti ti-chart-line"></i>Forecast
    </div>
    <div class="nav-btn" id="nav-today-btn" onclick="showPage('today')">
      <i class="ti ti-calendar-event"></i>Production
    </div>
    <div class="nav-btn" id="nav-stocktake-btn" onclick="showPage('stocktake')">
      <i class="ti ti-clipboard-list"></i>Stocktake
    </div>
    <div class="nav-btn" id="nav-settings-btn" onclick="showPage('settings')">
      <i class="ti ti-settings"></i>Settings
    </div>
  </div>

  <!-- Opening stock / stocktake modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-sheet">
      <div class="modal-title" id="modal-title">Enter opening stock</div>
      <div class="form-row">
        <div class="form-label">Date</div>
        <input type="date" class="form-input" id="mf-date">
      </div>
      <div class="form-row">
        <div class="form-label">Quantity (blocks)</div>
        <input type="number" class="form-input" id="mf-qty" min="0" placeholder="0" inputmode="numeric" enterkeyhint="done"
          onkeydown="if(event.key==='Enter'){event.preventDefault();saveModal();}">
      </div>
      <div class="modal-actions">
        <button class="btn secondary" onclick="closeModal()">Cancel</button>
        <button class="btn primary" id="modal-save-btn" onclick="saveModal()">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// CONFIG — fill these in once per device, or set via Settings flow below
// ══════════════════════════════════════════════
const SUPA_URL_DEFAULT = 'https://jrpysikxibrbbellroid.supabase.co';

let settings = {
  supaUrl: '',
  supaKey: '',
  branchNo: null,        // fixed branch for this device
  branchNames: {},
  excludedGrades: [],
  gradeNames: {},
};

function loadLocalSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('mobile_block_stock_settings') || 'null');
    if (saved) settings = { ...settings, ...saved };
  } catch(e) {}
  if (!settings.supaUrl) settings.supaUrl = SUPA_URL_DEFAULT;
}
function saveLocalSettings() {
  localStorage.setItem('mobile_block_stock_settings', JSON.stringify({
    supaUrl: settings.supaUrl, supaKey: settings.supaKey, branchNo: settings.branchNo
  }));
}

function supaHeaders() {
  return { 'apikey': settings.supaKey, 'Authorization': `Bearer ${settings.supaKey}` };
}

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let stockItems = [];               // capacity_stock_items — for grade list
let blockStockEntries = [];
let blockProduction = [];
let blockAdjustments = [];
let blockProductionTemplate = [];
let schedule = [];
let salesLines = [];
let machines = [];
let activeItem = null; // { type: 'grade'|'unit', key: gradeCode-or-productName }

// Unit products (pods etc) — parallel state to the block tables above
let unitStockEntries = [];
let unitProduction = [];
let unitAdjustments = [];
let unitProductionTemplate = [];

// ══════════════════════════════════════════════
// DATE HELPERS (ported from desktop app)
// ══════════════════════════════════════════════
function fmtDateLocal(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function todayLocal() { return fmtDateLocal(new Date()); }

// Pulls an overdue (still-outstanding) job's date forward onto the earliest
// day of a window, so it's never silently dropped from requirement once its
// own original week has passed. Jobs within/after the window keep their date.
function effectiveJobDate(jobDateStr, sortedWindowDays) {
  if (!sortedWindowDays.length) return jobDateStr;
  const earliest = sortedWindowDays[0];
  return jobDateStr < earliest ? earliest : jobDateStr;
}

function getWeekDates(offsetWeeks) {
  const now = new Date();
  const dow = (now.getDay() + 6) % 7; // Mon=0
  const monday = new Date(now);
  monday.setDate(now.getDate() - dow + offsetWeeks * 7);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function fmtShort(d) {
  return d.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
}

const DOW_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// ══════════════════════════════════════════════
// SUPABASE FETCH / WRITE HELPERS
// ══════════════════════════════════════════════
async function sbFetch(table, params = '') {
  const pageSize = 1000;
  let all = [];
  let offset = 0;
  while (true) {
    const res = await fetch(`${settings.supaUrl}/rest/v1/${table}?select=*${params}`, {
      headers: { ...supaHeaders(), 'Range-Unit': 'items', 'Range': `${offset}-${offset+pageSize-1}` }
    });
    if (!res.ok) { console.warn(`fetch ${table} failed`, res.status); break; }
    const page = await res.json();
    all = all.concat(page);
    if (page.length < pageSize) break;
    offset += pageSize;
  }
  return all;
}

async function sbInsert(table, row) {
  const res = await fetch(`${settings.supaUrl}/rest/v1/${table}`, {
    method: 'POST',
    headers: { ...supaHeaders(), 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify(row),
  });
  if (!res.ok) console.error(`insert ${table} failed:`, res.status, await res.text());
  return res.ok;
}

async function sbDelete(table, id) {
  const res = await fetch(`${settings.supaUrl}/rest/v1/${table}?id=eq.${id}`, {
    method: 'DELETE',
    headers: { ...supaHeaders(), 'Prefer': 'return=minimal' },
  });
  return res.ok;
}

// ══════════════════════════════════════════════
// LOAD ALL DATA
// ══════════════════════════════════════════════
async function loadAllData() {
  setStatus('Loading…');
  try {
    const [si, bse, bp, ba, bpt, sch, sl, mc, sharedSettings, use, up, ua, upt] = await Promise.all([
      sbFetch('capacity_stock_items'),
      sbFetch('block_stock_entries'),
      sbFetch('block_production'),
      sbFetch('block_adjustments'),
      sbFetch('block_production_template'),
      sbFetch('capacity_schedule', '&iscomplete=in.(0,1,4)'),
      sbFetch('capacity_sales_lines'),
      sbFetch('capacity_machines'),
      sbFetch('capacity_app_settings', '&id=eq.1'),
      sbFetch('unit_stock_entries'),
      sbFetch('unit_production'),
      sbFetch('unit_adjustments'),
      sbFetch('unit_production_template'),
    ]);
    stockItems = si; blockStockEntries = bse; blockProduction = bp;
    blockAdjustments = ba; blockProductionTemplate = bpt;
    schedule = sch; salesLines = sl; machines = mc;
    unitStockEntries = use; unitProduction = up; unitAdjustments = ua; unitProductionTemplate = upt;

    if (sharedSettings && sharedSettings.length) {
      const shared = sharedSettings[0].settings || {};
      settings.branchNames    = shared.branchNames    || {};
      settings.excludedGrades = shared.excludedGrades || [];
      settings.gradeNames     = shared.gradeNames      || {};
      settings.branchMaterial = shared.branchMaterial  || {};
      settings.unitProducts   = shared.unitProducts    || [];
    }
    setStatus(`Connected — updated ${new Date().toLocaleTimeString('en-NZ', {hour:'2-digit', minute:'2-digit'})}`, 'connected');
    return true;
  } catch (e) {
    console.error('loadAllData failed:', e);
    setStatus('Connection error — pull down to retry', 'error');
    return false;
  }
}

function setStatus(msg, state) {
  // state: 'connected' | 'error' | undefined (neutral/connecting)
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('status-dot');
  dot.classList.remove('connected', 'error');
  if (state) dot.classList.add(state);
}

function displayGrade(g) {
  return (settings.gradeNames && settings.gradeNames[g]) || g;
}
function branchName(bn) {
  return (settings.branchNames && settings.branchNames[bn]) || `Branch ${bn}`;
}

// ══════════════════════════════════════════════
// CORE CALC — ported faithfully from desktop calcBlockStock()
// ══════════════════════════════════════════════
function getTemplateQty(bn, grade, dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = (d.getDay() + 6) % 7;
  const t = blockProductionTemplate.find(
    t => Number(t.branch_no) === Number(bn) && t.grade === grade && t.day_of_week === dow
  );
  return t ? (t.qty || 0) : 0;
}

function getActualProduction(bn, grade, dateStr) {
  const entry = blockProduction.find(
    p => Number(p.branch_no) === Number(bn) && p.grade === grade && p.production_date === dateStr
  );
  return entry ? { qty: entry.qty, actual: true } : null;
}

function getForecastForWeek(bn, grade, workDayDates) {
  const today = todayLocal();
  return workDayDates.reduce((sum, d) => {
    if (d <= today) return sum;
    const actual = getActualProduction(bn, grade, d);
    const qty = actual !== null ? actual.qty : getTemplateQty(bn, grade, d);
    return sum + qty;
  }, 0);
}

function getUnitForecastForWeek(bn, productName, workDayDates) {
  const today = todayLocal();
  return workDayDates.reduce((sum, d) => {
    if (d <= today) return sum;
    const actual = getUnitActualProduction(bn, productName, d);
    const qty = actual !== null ? actual.qty : getUnitTemplateQty(bn, productName, d);
    return sum + qty;
  }, 0);
}

// Same visibility rule as desktop: a grade is relevant if it has any outstanding
// job requirement in the next 4 weeks (desktop's totalReq window), regardless
// of whether mobile only displays 2 weeks of input boxes.
function gradeHasRequirement(bn, grade) {
  const mat = (settings.branchMaterial || {})[bn] || {};
  const blockM3 = parseFloat(mat.blockM3) || 0;
  const wasteFac = 1 - ((parseFloat(mat.wastePct)||0)/100);
  if (!(blockM3 > 0 && wasteFac > 0)) return false;
  const stMap = Object.fromEntries(stockItems.map(s => [s.stockcode, s]));
  const slMap = Object.fromEntries(salesLines.map(l => [Number(l.solineid), l]));
  const mMap  = Object.fromEntries(machines.map(m => [Number(m.seqno), m]));

  const fourWeekDays = [];
  for (let i = 0; i < 4; i++) {
    getWeekDates(i).slice(0, 5).forEach(d => fourWeekDays.push(fmtDateLocal(d)));
  }

  let cubic = 0;
  schedule.filter(j =>
    (Number(j.iscomplete) === 0 || Number(j.iscomplete) === 4) &&
    (fourWeekDays.includes(j.startdate) || j.startdate < fourWeekDays[0])
  ).forEach(j => {
    const m = mMap[Number(j.machineno)];
    if (!m || Number(m.branchno) !== bn) return;
    const sl = slMap[Number(j.line_seqno)]; if (!sl) return;
    const st = stMap[sl.stockcode];
    if (!st || (st.x_grade||'').trim() !== grade || !parseFloat(st.x_cubic)) return;
    const lq = (parseFloat(sl.ord_quant)||0)-(parseFloat(sl.bkord_quant)||0)-(parseFloat(sl.sup_quant)||0);
    cubic += parseFloat(st.x_cubic) * Math.max(0, lq);
  });
  return cubic > 0;
}

function calcBlockStock(branchNo, grade) {
  const bn = Number(branchNo);
  const entries = blockStockEntries
    .filter(e => Number(e.branch_no) === bn && e.grade === grade)
    .sort((a, b) => b.entry_date.localeCompare(a.entry_date));
  if (!entries.length) return null;

  const base = entries[0];
  const baseDate = base.entry_date;
  const baseQty = base.qty;

  const todayStr = todayLocal();
  let produced = 0;
  for (let d = new Date(baseDate + 'T00:00:00'); fmtDateLocal(d) <= todayStr; d.setDate(d.getDate() + 1)) {
    const dow = (d.getDay() + 6) % 7;
    if (dow > 4) continue;
    const dateStr = fmtDateLocal(d);
    const actual = getActualProduction(bn, grade, dateStr);
    produced += actual !== null ? actual.qty : getTemplateQty(bn, grade, dateStr);
  }

  const adjustments = blockAdjustments
    .filter(a => Number(a.branch_no) === bn && a.grade === grade && a.adjustment_date >= baseDate)
    .reduce((s, a) => s + (a.qty || 0), 0);

  const mat = (settings.branchMaterial || {})[bn] || {};
  const blockM3 = parseFloat(mat.blockM3) || 0;
  const wasteFac = 1 - ((parseFloat(mat.wastePct) || 0) / 100);
  const stockMap = Object.fromEntries(stockItems.map(s => [s.stockcode, s]));
  const slMap = Object.fromEntries(salesLines.map(l => [Number(l.solineid), l]));
  const machineMap = Object.fromEntries(machines.map(m => [Number(m.seqno), m]));

  // Sum raw cubic across ALL completed jobs first, round to blocks ONCE at the
  // end — not per job — to match desktop's calculation exactly.
  let usedCubic = 0;
  schedule
    .filter(j => Number(j.iscomplete) === 1 && (j.completime || j.finishdate) >= baseDate)
    .forEach(j => {
      const m = machineMap[Number(j.machineno)];
      if (!m || Number(m.branchno) !== bn) return;
      const sl = slMap[Number(j.line_seqno)];
      if (!sl) return;
      const stock = stockMap[sl.stockcode];
      if (!stock || (stock.x_grade || '').trim() !== grade) return;
      if (!parseFloat(stock.x_cubic) || blockM3 === 0 || wasteFac <= 0) return;
      const lineQty = (parseFloat(sl.ord_quant) || 0) - (parseFloat(sl.bkord_quant) || 0) - (parseFloat(sl.sup_quant) || 0);
      usedCubic += parseFloat(stock.x_cubic) * Math.max(0, lineQty);
    });
  const usedBlocks = (blockM3 > 0 && wasteFac > 0) ? usedCubic / (blockM3 * wasteFac) : 0;

  const current = baseQty + produced + adjustments - usedBlocks;
  return { baseQty, baseDate, produced, adjustments, usedBlocks, current };
}

// ══════════════════════════════════════════════
// UNIT PRODUCTS (pods etc) — same mechanism as blocks but tracked by simple
// unit count, matched via LINKED_STOCKCODE instead of x_grade. No cubic
// conversion: 1 sales-line unit = 1 unit of stock.
// ══════════════════════════════════════════════
function getUnitProductCodes(productName) {
  const p = (settings.unitProducts || []).find(p => p.name === productName);
  return p ? (p.codes || []) : [];
}

function getUnitTemplateQty(bn, productName, dateStr) {
  const d   = new Date(dateStr + 'T00:00:00');
  const dow = (d.getDay() + 6) % 7;
  const t   = unitProductionTemplate.find(
    t => Number(t.branch_no) === Number(bn) && t.product_name === productName && t.day_of_week === dow
  );
  return t ? (t.qty || 0) : 0;
}

function getUnitActualProduction(bn, productName, dateStr) {
  const entry = unitProduction.find(
    p => Number(p.branch_no) === Number(bn) && p.product_name === productName && p.production_date === dateStr
  );
  return entry ? { qty: entry.qty, actual: true } : null;
}

function unitProductHasRequirement(bn, productName) {
  const codes = getUnitProductCodes(productName);
  if (!codes.length) return false;
  const slMap = Object.fromEntries(salesLines.map(l => [Number(l.solineid), l]));
  const mMap  = Object.fromEntries(machines.map(m => [Number(m.seqno), m]));
  const fourWeekDays = [];
  for (let i = 0; i < 4; i++) {
    getWeekDates(i).slice(0, 5).forEach(d => fourWeekDays.push(fmtDateLocal(d)));
  }
  let units = 0;
  schedule.filter(j =>
    (Number(j.iscomplete) === 0 || Number(j.iscomplete) === 4) &&
    (fourWeekDays.includes(j.startdate) || j.startdate < fourWeekDays[0])
  ).forEach(j => {
    const m = mMap[Number(j.machineno)];
    if (!m || Number(m.branchno) !== bn) return;
    const sl = slMap[Number(j.line_seqno)]; if (!sl) return;
    if (!codes.includes((sl.linked_stockcode||'').trim())) return;
    const lq = (parseFloat(sl.ord_quant)||0)-(parseFloat(sl.bkord_quant)||0)-(parseFloat(sl.sup_quant)||0);
    units += Math.max(0, lq);
  });
  return units > 0;
}

function calcUnitStock(branchNo, productName) {
  const bn = Number(branchNo);
  const codes = getUnitProductCodes(productName);
  if (!codes.length) return null;

  const entries = unitStockEntries
    .filter(e => Number(e.branch_no) === bn && e.product_name === productName)
    .sort((a, b) => b.entry_date.localeCompare(a.entry_date));
  if (!entries.length) return null;

  const base = entries[0];
  const baseDate = base.entry_date;
  const baseQty = base.qty;

  const todayStr = todayLocal();
  let produced = 0;
  for (let d = new Date(baseDate + 'T00:00:00'); fmtDateLocal(d) <= todayStr; d.setDate(d.getDate() + 1)) {
    const dow = (d.getDay() + 6) % 7;
    if (dow > 4) continue;
    const dateStr = fmtDateLocal(d);
    const actual = getUnitActualProduction(bn, productName, dateStr);
    produced += actual !== null ? actual.qty : getUnitTemplateQty(bn, productName, dateStr);
  }

  const adjustments = unitAdjustments
    .filter(a => Number(a.branch_no) === bn && a.product_name === productName && a.adjustment_date >= baseDate)
    .reduce((s, a) => s + (a.qty || 0), 0);

  const slMap = Object.fromEntries(salesLines.map(l => [Number(l.solineid), l]));
  const machineMap = Object.fromEntries(machines.map(m => [Number(m.seqno), m]));
  let usedUnits = 0;
  schedule
    .filter(j => Number(j.iscomplete) === 1 && (j.completime || j.finishdate) >= baseDate)
    .forEach(j => {
      const m = machineMap[Number(j.machineno)];
      if (!m || Number(m.branchno) !== bn) return;
      const sl = slMap[Number(j.line_seqno)];
      if (!sl || !codes.includes((sl.linked_stockcode||'').trim())) return;
      const lineQty = (parseFloat(sl.ord_quant) || 0) - (parseFloat(sl.bkord_quant) || 0) - (parseFloat(sl.sup_quant) || 0);
      usedUnits += Math.max(0, lineQty);
    });

  const current = baseQty + produced + adjustments - usedUnits;
  return { baseQty, baseDate, produced, adjustments, usedBlocks: usedUnits, current };
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
// Shared helper: returns the unified list of visible grades + unit products
// for a branch, applying the same "tracked stock OR current requirement"
// visibility rule used everywhere. { type, key, label } per item.
function getVisibleItems(bn) {
  const allGradesRaw = [...new Set(stockItems.map(s => (s.x_grade||'').trim()).filter(Boolean))].sort();
  const excluded = new Set(settings.excludedGrades || []);
  const grades = allGradesRaw.filter(g => {
    if (excluded.has(g)) return false;
    const hasStock = calcBlockStock(bn, g) !== null;
    return hasStock || gradeHasRequirement(bn, g);
  });
  const unitProducts = (settings.unitProducts || []).filter(p => p.name && p.codes && p.codes.length).filter(p => {
    const hasStock = calcUnitStock(bn, p.name) !== null;
    return hasStock || unitProductHasRequirement(bn, p.name);
  });
  return [
    ...grades.map(g => ({ type: 'grade', key: g, label: displayGrade(g) })),
    ...unitProducts.map(p => ({ type: 'unit', key: p.name, label: p.name })),
  ];
}

function renderGradeTabs() {
  const bn = settings.branchNo;
  const items = getVisibleItems(bn);

  if (!activeItem || !items.some(i => i.type === activeItem.type && i.key === activeItem.key)) {
    activeItem = items[0] || null;
  }

  const tabsEl = document.getElementById('grade-tabs');
  tabsEl.innerHTML = items.map(i => `
    <div class="grade-tab ${activeItem && i.type === activeItem.type && i.key === activeItem.key ? 'active' : ''}" onclick="selectItem('${i.type}','${i.key}')">${i.label}</div>
  `).join('');
}

function showPage(page) {
  document.getElementById('page-stock').style.display     = page === 'stock' ? 'flex' : 'none';
  document.getElementById('page-today').style.display     = page === 'today' ? 'flex' : 'none';
  document.getElementById('page-stocktake').style.display  = page === 'stocktake' ? 'flex' : 'none';
  document.getElementById('page-settings').style.display  = page === 'settings' ? 'flex' : 'none';
  document.getElementById('nav-stock-btn').classList.toggle('active', page === 'stock');
  document.getElementById('nav-today-btn').classList.toggle('active', page === 'today');
  document.getElementById('nav-stocktake-btn').classList.toggle('active', page === 'stocktake');
  document.getElementById('nav-settings-btn').classList.toggle('active', page === 'settings');
  document.getElementById('page-title').innerHTML = page === 'stock' ? 'Block <span>Forecast</span>'
    : page === 'today' ? '<span>Production</span>'
    : page === 'stocktake' ? '<span>Stocktake</span>'
    : '<span>Settings</span>';
  if (page === 'today') renderTodayPage();
  if (page === 'stocktake') renderStocktakePage();
  if (page === 'settings') renderSettingsPage();
}

function renderSettingsPage() {
  document.getElementById('set-supa-url').value = settings.supaUrl || '';
  document.getElementById('set-supa-key').value = settings.supaKey || '';
  document.getElementById('set-branch-no').value = settings.branchNo ?? '';
  const names = Object.entries(settings.branchNames || {});
  document.getElementById('set-branch-names').innerHTML = names.length
    ? 'Branches: ' + names.map(([no, name]) => `${no} = ${name}`).join(', ')
    : '';
}

async function saveDeviceSettings() {
  const url = document.getElementById('set-supa-url').value.trim();
  const key = document.getElementById('set-supa-key').value.trim();
  const branchVal = document.getElementById('set-branch-no').value.trim();

  if (!url || !key || branchVal === '') {
    showToast('Fill in all fields');
    return;
  }

  settings.supaUrl = url;
  settings.supaKey = key;
  settings.branchNo = parseInt(branchVal);
  saveLocalSettings();

  const msg = document.getElementById('settings-save-msg');
  msg.style.display = 'block';

  isFirstLoad = true; // allow the splash to show again for this reconnect
  await init();

  msg.style.display = 'none';
  showToast('Reconnected');
}

function selectItem(type, key) {
  activeItem = { type, key };
  renderGradeTabs();
  renderContent();
}

function renderContent() {
  const el = document.getElementById('content');
  const bn = settings.branchNo;

  document.getElementById('branch-name-display').textContent = branchName(bn);

  if (!activeItem) {
    el.innerHTML = `<div class="empty-state"><i class="ti ti-package" style="font-size:36px;"></i><div>No grades or products available</div></div>`;
    return;
  }

  const isUnit = activeItem.type === 'unit';
  const key = activeItem.key; // grade code, or unit product name
  const displayName = isUnit ? key : displayGrade(key);
  const stock = isUnit ? calcUnitStock(bn, key) : calcBlockStock(bn, key);
  const currentStock = stock ? stock.current : 0;

  const weeks2 = Array.from({length: 2}, (_, i) => {
    const days = getWeekDates(i).slice(0, 5).map(d => fmtDateLocal(d));
    const label = i === 0 ? 'This week' : 'Next week';
    return { days, label, offset: i };
  });

  const today = todayLocal();
  const currentWeekStart = weeks2[0].days[0];

  const weekBlocks = weeks2.map(wk => {
    const slMap = Object.fromEntries(salesLines.map(l => [Number(l.solineid), l]));
    const mMap  = Object.fromEntries(machines.map(m => [Number(m.seqno), m]));

    let required = 0;
    if (isUnit) {
      // Unit products: direct unit count from outstanding sales lines matched
      // via LINKED_STOCKCODE — no cubic/blockM3 conversion at all.
      const codes = getUnitProductCodes(key);
      let units = 0;
      const overdueWindow = wk.offset === 0 ? wk.days : null;
      schedule.filter(j => {
        if (Number(j.iscomplete) !== 0 && Number(j.iscomplete) !== 4) return false;
        if (overdueWindow) return effectiveJobDate(j.startdate, overdueWindow) <= wk.days[wk.days.length-1];
        return wk.days.includes(j.startdate);
      }).forEach(j => {
        const m = mMap[Number(j.machineno)];
        if (!m || Number(m.branchno) !== bn) return;
        const sl = slMap[Number(j.line_seqno)]; if (!sl) return;
        if (!codes.includes((sl.linked_stockcode||'').trim())) return;
        const lq = (parseFloat(sl.ord_quant)||0)-(parseFloat(sl.bkord_quant)||0)-(parseFloat(sl.sup_quant)||0);
        units += Math.max(0, lq);
      });
      required = Math.round(units);
    } else {
      // Grades: cubic-sum-then-round-once via blockM3/waste, same as desktop
      const mat = (settings.branchMaterial || {})[bn] || {};
      const blockM3 = parseFloat(mat.blockM3) || 0;
      const wasteFac = 1 - ((parseFloat(mat.wastePct)||0)/100);
      const stMap = Object.fromEntries(stockItems.map(s => [s.stockcode, s]));
      let cubic = 0;
      const overdueWindow2 = wk.offset === 0 ? wk.days : null;
      schedule.filter(j => {
        if (Number(j.iscomplete) !== 0 && Number(j.iscomplete) !== 4) return false;
        if (overdueWindow2) return effectiveJobDate(j.startdate, overdueWindow2) <= wk.days[wk.days.length-1];
        return wk.days.includes(j.startdate);
      }).forEach(j => {
        const m = mMap[Number(j.machineno)];
        if (!m || Number(m.branchno) !== bn) return;
        const sl = slMap[Number(j.line_seqno)]; if (!sl) return;
        const st = stMap[sl.stockcode];
        if (!st || (st.x_grade||'').trim() !== key || !parseFloat(st.x_cubic)) return;
        const lq = (parseFloat(sl.ord_quant)||0)-(parseFloat(sl.bkord_quant)||0)-(parseFloat(sl.sup_quant)||0);
        cubic += parseFloat(st.x_cubic) * Math.max(0, lq);
      });
      required = (blockM3>0 && wasteFac>0 && cubic>0) ? Math.ceil(cubic/(blockM3*wasteFac)) : 0;
    }

    const forecast = isUnit ? getUnitForecastForWeek(bn, key, wk.days) : getForecastForWeek(bn, key, wk.days);

    const dayCells = wk.days.map(d => {
      const actual = isUnit ? getUnitActualProduction(bn, key, d) : getActualProduction(bn, key, d);
      const tmpl = isUnit ? getUnitTemplateQty(bn, key, d) : getTemplateQty(bn, key, d);
      const isPast = d < currentWeekStart;
      const isToday = d === today;
      const isFuture = d > today;
      const qty = actual !== null ? actual.qty : tmpl;
      const isOverride = isFuture && actual !== null;
      const dow = DOW_LABELS[(new Date(d+'T00:00:00').getDay()+6)%7];
      const cls = isOverride ? 'override' : (!isFuture && actual !== null) ? 'actual' : '';
      const subLabel = isPast ? '' : isToday ? 'today' : isOverride ? 'override' : 'template';
      return `
        <div class="day-col">
          <div class="day-dow ${isToday?'today':''}">${dow}</div>
          <input type="number" min="0" inputmode="numeric" class="day-input ${cls}" value="${qty}"
            ${isPast ? 'disabled' : ''}
            onfocus="this.select()"
            onchange="${isUnit ? `saveUnitDayForecast('${key}','${d}',this.value,${isFuture})` : `saveDayForecast('${key}','${d}',this.value,${isFuture})`}">
          <div class="day-sub">${subLabel}</div>
        </div>`;
    }).join('');

    return `
      <div class="week-block">
        <div class="week-block-title">
          <span>${wk.label}</span>
          <span class="req-fcast">${required} req / ${forecast} fcast</span>
        </div>
        <div class="day-row">${dayCells}</div>
      </div>`;
  }).join('');

  const stockCol = currentStock <= 0 ? 'var(--red)' : 'var(--text)';

  el.innerHTML = `
    <div class="stock-card">
      <div class="stock-top">
        <div>
          <div class="stock-label">Current stock — ${displayName}</div>
          <div class="stock-val" style="color:${stockCol}">${Math.round(currentStock)}</div>
        </div>
      </div>
      <div class="qty-actions">
        <div class="qty-btn" onclick="openModal('opening')"><i class="ti ti-clipboard-list"></i> Stocktake</div>
        <div class="qty-btn primary" onclick="openModal('production')"><i class="ti ti-plus"></i> Add production</div>
      </div>
      ${weekBlocks}
    </div>`;
}

// ══════════════════════════════════════════════
// SAVE DAY INPUT (override forecast / record actual)
// ══════════════════════════════════════════════
// ══════════════════════════════════════════════
// PRODUCTION PAGE — all grades on one screen, today + previous 2 weekdays
// ══════════════════════════════════════════════
function getPrevWeekdays(count) {
  // Returns the last `count` weekdays strictly before today, oldest first
  const days = [];
  let d = new Date();
  while (days.length < count) {
    d.setDate(d.getDate() - 1);
    const dow = (d.getDay() + 6) % 7; // Mon=0..Sun=6
    if (dow <= 4) days.unshift(fmtDateLocal(d));
  }
  return days;
}

function renderTodayPage() {
  const el = document.getElementById('today-content');
  const bn = settings.branchNo;
  const today = todayLocal();
  const prevDays = getPrevWeekdays(2);
  const allDays = [...prevDays, today]; // oldest -> today, left to right

  const items = getVisibleItems(bn);

  if (!items.length) {
    el.innerHTML = `<div class="empty-state"><i class="ti ti-calendar-event"></i><div>No grades or products to show</div></div>`;
    return;
  }

  const dayHeaderCells = allDays.map(d => {
    const isToday = d === today;
    const dow = new Date(d+'T00:00:00').toLocaleDateString('en-NZ', { weekday: 'short' });
    const dnum = new Date(d+'T00:00:00').getDate();
    return `<div class="prod-daycol-head ${isToday?'today':''}">${dow}<br>${dnum}</div>`;
  }).join('');

  const rows = items.map(item => {
    const isUnit = item.type === 'unit';
    const dayCells = allDays.map(d => {
      const actual = isUnit ? getUnitActualProduction(bn, item.key, d) : getActualProduction(bn, item.key, d);
      const tmpl = isUnit ? getUnitTemplateQty(bn, item.key, d) : getTemplateQty(bn, item.key, d);
      const qty = actual !== null ? actual.qty : tmpl;
      const cls = actual !== null ? 'actual' : '';
      return `<input type="number" min="0" inputmode="numeric" class="today-input ${cls}" value="${qty}"
        onfocus="this.select()" onchange="saveTodayProduction('${item.type}','${item.key}','${d}', this.value)">`;
    }).join('');
    return `
      <div class="today-row">
        <div class="grade-name" style="flex:0 0 70px;">${item.label}</div>
        <div class="prod-day-inputs">${dayCells}</div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">${branchName(bn)}</div>
    <div class="today-row" style="background:transparent;border:none;padding:0 0 4px;">
      <div style="flex:0 0 70px;"></div>
      <div class="prod-day-inputs">${dayHeaderCells}</div>
    </div>
    ${rows}
    <div style="font-size:11px;color:var(--faint);margin-top:10px;text-align:center;">
      Need to go back further? Use the Stock tab to enter production for any past date.
    </div>`;
}

async function saveTodayProduction(itemType, key, dateStr, qty) {
  const bn = settings.branchNo;
  const qtyInt = parseInt(qty) || 0;
  const isUnit = itemType === 'unit';
  const table = isUnit ? 'unit_production' : 'block_production';
  const keyField = isUnit ? 'product_name' : 'grade';

  const list = isUnit ? unitProduction : blockProduction;
  const existing = list.find(
    p => Number(p.branch_no) === Number(bn) && p[keyField] === key && p.production_date === dateStr
  );
  if (existing) await sbDelete(table, existing.id);
  await sbInsert(table, { branch_no: Number(bn), [keyField]: key, production_date: dateStr, qty: qtyInt, notes: 'Actual production' });

  showToast('Saved');
  await loadAllData();
  renderTodayPage();
}

// ══════════════════════════════════════════════
// STOCKTAKE PAGE — today only, one input per grade, blank by default since
// a stocktake is a fresh physical count, not an edit of an existing value
// ══════════════════════════════════════════════
function renderStocktakePage() {
  const el = document.getElementById('stocktake-content');
  const bn = settings.branchNo;

  const items = getVisibleItems(bn);

  if (!items.length) {
    el.innerHTML = `<div class="empty-state"><i class="ti ti-clipboard-list"></i><div>No grades or products to show</div></div>`;
    return;
  }

  const rows = items.map(item => {
    const isUnit = item.type === 'unit';
    const stock = isUnit ? calcUnitStock(bn, item.key) : calcBlockStock(bn, item.key);
    const systemQty = stock ? Math.round(stock.current) : null;
    return `
      <div class="today-row">
        <div style="flex:1;">
          <div class="grade-name">${item.label}</div>
          <div class="grade-sub">${systemQty != null ? `System: ${systemQty}` : 'No stock tracked yet'}</div>
        </div>
        <input type="number" min="0" inputmode="numeric" enterkeyhint="done" class="today-input" style="flex:0 0 80px;" placeholder="Count"
          onfocus="this.select()"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
          onchange="saveStocktakeFromPage('${item.type}','${item.key}', this.value, this)">
      </div>`;
  }).join('');

  el.innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">${new Date().toLocaleDateString('en-NZ', { weekday: 'long', day: 'numeric', month: 'long' })} — ${branchName(bn)}</div>
    ${rows}
    <div style="font-size:11px;color:var(--faint);margin-top:10px;text-align:center;">
      Enter a physical count to set today's stock. This replaces all earlier entries for that grade/product.
    </div>`;
}

async function saveStocktakeFromPage(itemType, key, qty, inputEl) {
  const bn = settings.branchNo;
  const qtyInt = parseInt(qty);
  if (isNaN(qtyInt) || qtyInt < 0) return;
  const isUnit = itemType === 'unit';

  inputEl.disabled = true;
  const ok = isUnit
    ? await saveUnitStocktakeEntry(bn, key, todayLocal(), qtyInt)
    : await saveStocktakeEntry(bn, key, todayLocal(), qtyInt);
  inputEl.disabled = false;

  if (ok) {
    showToast('Stocktake saved');
    await loadAllData();
    renderStocktakePage();
  } else {
    showToast('Save failed — check connection');
  }
}

async function saveDayForecast(grade, dateStr, qty, isFuture) {
  const bn = settings.branchNo;
  const qtyInt = parseInt(qty) || 0;
  const noteStr = isFuture ? 'Forecast override' : 'Actual production';

  const existing = blockProduction.find(
    p => Number(p.branch_no) === Number(bn) && p.grade === grade && p.production_date === dateStr
  );
  if (existing) await sbDelete('block_production', existing.id);

  // A future override of 0 is deliberate ("definitely zero") and must still
  // be saved as a real row, otherwise it falls back to the template on reload.
  if (qtyInt >= 0) {
    await sbInsert('block_production', { branch_no: Number(bn), grade, production_date: dateStr, qty: qtyInt, notes: noteStr });
  }
  showToast('Saved');
  await loadAllData();
  renderContent();
}

async function saveUnitDayForecast(productName, dateStr, qty, isFuture) {
  const bn = settings.branchNo;
  const qtyInt = parseInt(qty) || 0;
  const noteStr = isFuture ? 'Forecast override' : 'Actual production';

  const existing = unitProduction.find(
    p => Number(p.branch_no) === Number(bn) && p.product_name === productName && p.production_date === dateStr
  );
  if (existing) await sbDelete('unit_production', existing.id);

  // A future override of 0 is deliberate ("definitely zero") and must still
  // be saved as a real row, otherwise it falls back to the template on reload.
  if (qtyInt >= 0) {
    await sbInsert('unit_production', { branch_no: Number(bn), product_name: productName, production_date: dateStr, qty: qtyInt, notes: noteStr });
  }
  showToast('Saved');
  await loadAllData();
  renderContent();
}

// ══════════════════════════════════════════════
// MODAL — opening stock (stocktake) / production entry
// ══════════════════════════════════════════════
let modalMode = null;
function openModal(mode) {
  modalMode = mode;
  document.getElementById('modal-title').textContent = mode === 'opening' ? 'Enter stocktake count' : 'Add production';
  document.getElementById('mf-date').value = todayLocal();
  document.getElementById('mf-qty').value = '';
  document.getElementById('modal-overlay').classList.add('show');
  // Auto-focus the quantity field — date is already pre-filled to today, so
  // this is almost always the only field someone needs to type into. Small
  // delay so the input is actually laid out/visible before focusing.
  setTimeout(() => document.getElementById('mf-qty').focus(), 80);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

// Shared stocktake-save logic — same reset behaviour as desktop: variance
// note, then clear entries up to and including the stocktake date (superseded
// by the physical count), keeping anything entered for days AFTER it.
// Used by both the opening-stock modal and the Stocktake page.
async function saveStocktakeEntry(bn, grade, dt, qty) {
  let varianceNote = '';
  if (dt <= todayLocal()) {
    const priorStock = calcBlockStock(bn, grade);
    if (priorStock) {
      const variance = qty - Math.round(priorStock.current);
      if (variance !== 0) varianceNote = ` (variance ${variance > 0 ? '+' : ''}${variance} vs system: was ${Math.round(priorStock.current)})`;
    }
  }
  const ok = await sbInsert('block_stock_entries', { branch_no: bn, grade, entry_date: dt, qty, notes: 'Opening count' + varianceNote });
  if (ok && dt <= todayLocal()) {
    const prodToDelete = blockProduction.filter(p => Number(p.branch_no)===bn && p.grade===grade && p.production_date<=dt);
    const adjToDelete  = blockAdjustments.filter(a => Number(a.branch_no)===bn && a.grade===grade && a.adjustment_date<=dt);
    await Promise.all([
      ...prodToDelete.map(r => sbDelete('block_production', r.id)),
      ...adjToDelete.map(r => sbDelete('block_adjustments', r.id)),
    ]);
    const oldEntries = blockStockEntries.filter(e => Number(e.branch_no)===bn && e.grade===grade && e.entry_date < dt);
    await Promise.all(oldEntries.map(e => sbDelete('block_stock_entries', e.id)));
  }
  return ok;
}

// Same as saveStocktakeEntry but for unit products
async function saveUnitStocktakeEntry(bn, productName, dt, qty) {
  let varianceNote = '';
  if (dt <= todayLocal()) {
    const priorStock = calcUnitStock(bn, productName);
    if (priorStock) {
      const variance = qty - Math.round(priorStock.current);
      if (variance !== 0) varianceNote = ` (variance ${variance > 0 ? '+' : ''}${variance} vs system: was ${Math.round(priorStock.current)})`;
    }
  }
  const ok = await sbInsert('unit_stock_entries', { branch_no: bn, product_name: productName, entry_date: dt, qty, notes: 'Opening count' + varianceNote });
  if (ok && dt <= todayLocal()) {
    const prodToDelete = unitProduction.filter(p => Number(p.branch_no)===bn && p.product_name===productName && p.production_date<=dt);
    const adjToDelete  = unitAdjustments.filter(a => Number(a.branch_no)===bn && a.product_name===productName && a.adjustment_date<=dt);
    await Promise.all([
      ...prodToDelete.map(r => sbDelete('unit_production', r.id)),
      ...adjToDelete.map(r => sbDelete('unit_adjustments', r.id)),
    ]);
    const oldEntries = unitStockEntries.filter(e => Number(e.branch_no)===bn && e.product_name===productName && e.entry_date < dt);
    await Promise.all(oldEntries.map(e => sbDelete('unit_stock_entries', e.id)));
  }
  return ok;
}

async function saveModal() {
  const bn = settings.branchNo;
  const isUnit = activeItem && activeItem.type === 'unit';
  const key = activeItem ? activeItem.key : null;
  const dt = document.getElementById('mf-date').value;
  const qty = parseInt(document.getElementById('mf-qty').value);
  if (!dt || isNaN(qty)) { showToast('Enter a date and quantity'); return; }

  const btn = document.getElementById('modal-save-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  let ok = false;
  if (modalMode === 'opening') {
    ok = isUnit ? await saveUnitStocktakeEntry(bn, key, dt, qty) : await saveStocktakeEntry(bn, key, dt, qty);
  } else if (modalMode === 'production') {
    const isFuture = dt > todayLocal();
    const notes = isFuture ? 'Forecast override' : 'Actual production';
    ok = isUnit
      ? await sbInsert('unit_production', { branch_no: bn, product_name: key, production_date: dt, qty, notes })
      : await sbInsert('block_production', { branch_no: bn, grade: key, production_date: dt, qty, notes });
  }

  btn.textContent = 'Save'; btn.disabled = false;
  if (ok) {
    closeModal();
    showToast('Saved');
    await loadAllData();
    renderContent();
  } else {
    showToast('Save failed — check connection');
  }
}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ══════════════════════════════════════════════
// FIRST-RUN SETUP — ask for Supabase key + fixed branch if not configured
// ══════════════════════════════════════════════
let isFirstLoad = true;
function hideSplash() {
  if (!isFirstLoad) return;
  isFirstLoad = false;
  document.getElementById('splash-screen').classList.add('hide');
}
function setSplashStatus(msg) {
  const el = document.getElementById('splash-status');
  if (el) el.textContent = msg;
}

async function ensureConfigured() {
  if (settings.supaKey && settings.branchNo !== null) return true;

  // Setup needed — reveal the underlying UI so the browser's prompt() dialogs
  // aren't fighting a full-screen splash for visibility
  hideSplash();

  const key = settings.supaKey || prompt('Enter Supabase service/anon key for this device:');
  if (!key) { setStatus('Setup required — reload to configure'); return false; }
  settings.supaKey = key.trim();

  if (settings.branchNo === null) {
    // Try to load branch names from shared settings first for a friendlier prompt
    try {
      const res = await fetch(`${settings.supaUrl}/rest/v1/capacity_app_settings?id=eq.1&select=settings`, { headers: supaHeaders() });
      if (res.ok) {
        const rows = await res.json();
        const shared = rows[0]?.settings || {};
        settings.branchNames = shared.branchNames || {};
      }
    } catch(e) {}
    const names = Object.entries(settings.branchNames).map(([no, name]) => `${no} = ${name}`).join('\n');
    const branchInput = prompt(`Enter the branch number for this device:\n${names}`);
    if (branchInput === null || branchInput.trim() === '') { setStatus('Setup required — reload to configure'); return false; }
    settings.branchNo = parseInt(branchInput.trim());
  }

  saveLocalSettings();
  return true;
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init() {
  loadLocalSettings();
  setSplashStatus('Connecting to database…');
  const configured = await ensureConfigured();
  if (!configured) { hideSplash(); return; }

  setSplashStatus('Loading stock data…');
  const ok = await loadAllData();
  if (ok) {
    renderGradeTabs();
    const onTodayPage     = document.getElementById('page-today').style.display !== 'none';
    const onStocktakePage = document.getElementById('page-stocktake').style.display !== 'none';
    if (onTodayPage) renderTodayPage();
    else if (onStocktakePage) renderStocktakePage();
    else renderContent();
  }
  hideSplash();
}

// Pull-to-refresh feel: simple manual refresh on visibility/online events
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') init();
});
window.addEventListener('online', init);

// Register service worker — required by Chrome/Android for full PWA install
// behaviour (manifest icon, standalone display) instead of a plain bookmark.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW registration failed:', e));
  });
}

init();
</script>
